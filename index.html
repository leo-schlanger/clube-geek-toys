<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d4a520" />

    <title>Clube Geek & Toys - Descontos Exclusivos para Membros</title>
    <meta name="description" content="Faça parte do Clube Geek & Toys e tenha descontos exclusivos de até 50% em produtos e serviços. Planos a partir de R$ 19,90/mês. Brindes mensais e acesso VIP!" />
    <meta name="keywords" content="clube geek, descontos funko pop, clube de vantagens, geek toys, clube fidelidade, descontos colecionáveis" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Clube Geek & Toys - Descontos Exclusivos" />
    <meta property="og:description" content="Até 50% de desconto em produtos e serviços. Brindes mensais e acesso VIP para membros!" />
    <meta property="og:image" content="/logo.jpg" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="https://club.geeketoys.com.br" />

    <!-- DNS Prefetch for faster Firebase connection -->
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />

    <!-- Fonts - Same as main project -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Inline loading state - shows immediately while JS loads -->
      <div id="initial-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0d0d;font-family:Inter,sans-serif;">
        <div style="text-align:center;">
          <img src="/logo.jpg" alt="Geek & Toys" style="height:64px;border-radius:8px;margin-bottom:16px;" />
          <div style="color:#d4a520;font-size:14px;">Carregando...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader when React mounts
      window.addEventListener('DOMContentLoaded', function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(function() { loader.style.display = 'none'; }, 100);
        }
      });
    </script>
  </body>
</html>
