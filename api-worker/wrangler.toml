name = "api-worker"
main = "src/index.ts"
compatibility_date = "2026-03-02"
compatibility_flags = ["nodejs_compat"]

[vars]
FIREBASE_PROJECT_ID = "clube-geek-toys"
FRONTEND_URL = "https://clube-geek-toys.web.app"
WORKER_URL = "https://api-worker.leoschlanger.workers.dev"
# Email sender - verified domain
FROM_EMAIL = "Clube Geek & Toys <contato@geeketoys.com.br>"
# Admin email for contract notifications
ADMIN_EMAIL = "admin@geeketoys.com.br"

# Note: Sensitive secrets are managed via 'wrangler secret put'
# Required secrets:
# - MERCADOPAGO_ACCESS_TOKEN
# - MERCADOPAGO_WEBHOOK_SECRET (optional)
# - RESEND_API_KEY (for email sending)
# - FIREBASE_API_KEY (for email verification links)

# Cron triggers for scheduled tasks
# Runs daily at 6:00 AM UTC (3:00 AM BRT)
[triggers]
crons = ["0 6 * * *"]

# Rate Limiting KV (create with: wrangler kv namespace create RATE_LIMIT)
# Uncomment after creating the namespace:
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<your-kv-namespace-id>"

# Security: Rate limiting configuration
# To enable, create KV namespace and add rate limiting logic to worker
