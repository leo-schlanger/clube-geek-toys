# Development config — HTTP only, no SSL
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/uploads/;
    }

    # Cache static assets
    location ~* \.(js|css|jpg|jpeg|gif|png|svg|webp|ico|woff|woff2)$ {
        expires 1d;
    }
}
