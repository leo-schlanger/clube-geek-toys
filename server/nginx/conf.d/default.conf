# ============================================
# HTTP → HTTPS redirect + ACME challenge
# ============================================
server {
    listen 80;
    server_name club.geeketoys.com.br admin.geeketoys.com.br adm.geeketoys.com.br api.geeketoys.com.br analytics.geeketoys.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Catch-all for IP access (HTTP)
server {
    listen 80 default_server;
    server_name _;

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ============================================
# club.geeketoys.com.br — Member SPA
# ============================================
server {
    listen 443 ssl;
    http2 on;
    server_name club.geeketoys.com.br;

    ssl_certificate /etc/letsencrypt/live/club.geeketoys.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/club.geeketoys.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    include /etc/nginx/shared-headers.conf;
}

# ============================================
# admin + adm — Admin SPA (same cert, same build)
# ============================================
server {
    listen 443 ssl;
    http2 on;
    server_name admin.geeketoys.com.br adm.geeketoys.com.br;

    ssl_certificate /etc/letsencrypt/live/club.geeketoys.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/club.geeketoys.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    include /etc/nginx/shared-headers.conf;
}

# ============================================
# api.geeketoys.com.br — Express API
# ============================================
server {
    listen 443 ssl;
    http2 on;
    server_name api.geeketoys.com.br;

    ssl_certificate /etc/letsencrypt/live/club.geeketoys.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/club.geeketoys.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options nosniff always;
    }

    location / {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

